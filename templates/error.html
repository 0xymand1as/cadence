{% extends "base.html" %}
{% block title %}Something went wrong — Cadence{% endblock %}
{% block content %}
<section class="section">
  <div class="wrap" style="text-align:center;max-width:54ch;margin-inline:auto">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--sky);margin-bottom:1rem"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="16.5" r=".5" fill="currentColor"/></svg>
    <div class="eyebrow">Something's off</div>
    <h2 style="margin-bottom:1rem">Hit a snag.</h2>
    <p class="lead" style="margin-bottom:2rem">{{ message }}</p>
    <a class="btn btn-primary" href="{{ url_for('index') }}">Back to home</a>
    {% if current_user.is_authenticated %}
    <a class="btn btn-ghost" href="{{ url_for('dashboard') }}" style="margin-left:.5rem">Dashboard</a>
    {% endif %}
  </div>
</section>
{% endblock %}
