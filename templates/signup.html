{% extends "base.html" %}

{% block title %}Sign up — Cadence{% endblock %}

{% block content %}
<section class="hero" style="padding:80px 0 100px">
  <div class="wrap" style="max-width:480px">
    <div style="text-align:center;margin-bottom:32px">
      <div class="eyebrow">Get Started</div>
      <h1 style="font-size:42px">Create your <span class="italic-accent">Cadence</span> account.</h1>
      <p class="hero-sub" style="font-size:16px;margin-top:14px">Free for 14 days. No credit card required.</p>
    </div>

    <form action="/signup" method="post" class="card" style="padding:40px">
      <label style="display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px">Name</label>
      <input type="text" name="name" required style="width:100%;padding:12px 14px;border:1px solid rgba(11,18,32,.12);border-radius:10px;font-family:var(--font-b);font-size:15px;margin-bottom:18px"/>

      <label style="display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px">Email</label>
      <input type="email" name="email" required style="width:100%;padding:12px 14px;border:1px solid rgba(11,18,32,.12);border-radius:10px;font-family:var(--font-b);font-size:15px;margin-bottom:18px"/>

      <label style="display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px">Password</label>
      <input type="password" name="password" required minlength="8" style="width:100%;padding:12px 14px;border:1px solid rgba(11,18,32,.12);border-radius:10px;font-family:var(--font-b);font-size:15px;margin-bottom:24px"/>

      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Create account →</button>

      <p style="text-align:center;margin-top:18px;font-size:13px;color:var(--ink-mute)">
        By creating an account you agree to our <a href="/terms" style="color:var(--sky-deep)">Terms</a> and <a href="/privacy" style="color:var(--sky-deep)">Privacy Policy</a>.
      </p>
    </form>

    <p style="text-align:center;margin-top:24px;font-size:14px;color:var(--ink-soft)">
      Already have an account? <a href="/login" style="color:var(--sky-deep);font-weight:600">Sign in</a>
    </p>
  </div>
</section>
{% endblock %}
