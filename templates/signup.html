{% extends "base.html" %}
{% block title %}Sign up — Cadence{% endblock %}
{% block content %}
<section class="section-sm">
  <div class="form-card">
    <div class="eyebrow">Free beta</div>
    <h2 style="margin-bottom:1rem">Create your account</h2>
    <p style="color:var(--text-dim);margin-bottom:2rem">No credit card. Connect your TikTok in the next step.</p>
    <form method="POST">
      <div class="form-row">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" required autocomplete="email" autofocus>
      </div>
      <div class="form-row">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" required minlength="8" autocomplete="new-password">
        <div class="form-hint">8+ characters.</div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Create account</button>
    </form>
    <div style="margin-top:1.5rem;font-size:.9rem;color:var(--text-dim);text-align:center">
      Already have one? <a href="{{ url_for('login') }}" style="color:var(--sky-deep);font-weight:600">Sign in</a>
    </div>
  </div>
</section>
{% endblock %}
